schema_version: 1

context:
  name: databricks-sql-connector
  version: 4.2.6

recipe:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/databricks_sql_connector-${{ version }}.tar.gz
  sha256: 65e59f08e55dcc563c05e02e2321d5171dd9482e5792328d99ac097377795d01

build:
  number: 1

outputs:
  - package:
      name: ${{ name }}
    build:
      noarch: python
      script:
        - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - poetry-core >=1.0.0
      run:
        - python >=${{ python_min }},<4.0.0
        - thrift >=0.22.0,<0.23.0
        - pandas >=2.2.3,<2.4.0
        - lz4 >=4.4.5,<5.0.0
        - requests >=2.18.1,<3.0.0
        - oauthlib >=3.1.0,<4.0.0
        - openpyxl >=3.0.10,<4.0.0
        - urllib3 >=1.26
        - python-dateutil >=2.8.0,<3.0.0
        - pyjwt >=2.0.0,<3.0.0
        - pybreaker >=1.0.0,<2.0.0
    tests:
      - python:
          imports:
            - databricks
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: ${{ name }}-with-pyarrow
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }},<4.0.0
        - ${{ pin_subpackage(name, exact=True) }}
        - pyarrow >=22.0.0
    tests:
      - python:
          imports:
            - databricks
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

about:
  homepage: https://databricks.com
  summary: Databricks SQL Connector for Python
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://docs.databricks.com/dev-tools/python-sql-connector.html
  repository: https://github.com/databricks/databricks-sql-python

extra:
  recipe-maintainers:
    - xylar